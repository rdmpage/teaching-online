<html>
<head>
<link rel="stylesheet" href="js/leaflet-0.7.3/leaflet.css" />
<script src="js/leaflet-0.7.3/leaflet.js" type="text/javascript"></script>
</head>
<body>
  	<div style="font-size:24px;height:20%;padding:10px;">
  	<b>Display a local GeoRSS feed on a map</b>
			<input style="font-size:24px;" size="60" type="text" id="feed" value="http://api.flickr.com/services/feeds/geo/?g=806927@N20&lang=en-us&format=rss_200" placeholder="URL of feed">
			<button style="font-size:24px;" id="find" onclick="show();">Show</button>

  	</div>



    <div id="map" style="width: 100%; height: 500px"></div>

    <script>
    	/* Much of this based on https://gis.stackexchange.com/questions/158885/georss-in-leaflet */
        //var lat = 39;
        //var lng = 17;
        //var zoom = 2;
        //var map = L.map('map').setView([lat,lng],zoom);
        
        
		var osmUrl='http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
		var osmAttrib='Map data © <a href="http://openstreetmap.org">OpenStreetMap</a> contributors';
		var osm1 = new L.TileLayer(osmUrl, {minZoom: 1, maxZoom: 12, attribution: osmAttrib});		
	        
       
		var map = L.map('map', {
			center: [0, 0],
			zoom: 2,
			maxZoom: 20,
			layers: [osm1]
		});
             
		/*
        // set up the ajax call
        function getXML(url) {
            return $.get(url)
        }
        */
        
      function show() {    
    
  		 var url = 'proxy.php?url=' + document.getElementById('feed').value;

        // fire and handle the result
fetch(url)
  .then(response => response.text())
  .then(str => {
    // Parse XML string into a document
    const parser = new DOMParser();
    const xml = parser.parseFromString(str, "application/xml");

    // Get all <entry> elements
    const entries = xml.querySelectorAll("entry");

    entries.forEach(entry => {
      let output = {};

      // Loop through child nodes of each <entry>
      const nodes = entry.children;

      Array.from(nodes).forEach(node => {
        const name = node.tagName;
        const value = node.textContent;
        output[name] = value;
      });

      // Log output
      console.log(JSON.stringify(output, null, 2));

      // Create marker if GEO:LAT exists
      if (output['GEO:LAT']) {
        const lat = parseFloat(output['GEO:LAT']);
        const lng = parseFloat(output['GEO:LONG']);

        const marker = L.marker([lat, lng]);
        const popupContent = output.CONTENT;

        marker.bindPopup(popupContent);
        marker.addTo(map);
      }

     
      // Alternative georss:point handling
      if (output['georss:point']) {
        const coords = output['georss:point'].split(" ");
        const lat = parseFloat(coords[0]);
        const lng = parseFloat(coords[1]);

        const marker = L.marker([lat, lng]);
        const popupContent = output.content;

        marker.bindPopup(popupContent);
        marker.addTo(map);
      }
     
    });
  })
  .catch(error => {
    console.error("Error fetching or parsing XML:", error);
  });

        }

    </script>
</body>
</html>
